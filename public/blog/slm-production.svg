  <text x="100" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" fill="#94a3b8">AI Systems Engineering</text>
