<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#450a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#991b1b" stroke-width="1" stroke-opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <circle cx="950" cy="500" r="400" fill="#f87171" opacity="0.1" filter="blur(50px)" />
  <text x="100" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">Lessons Learned</text>
  <text x="100" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">Building OmniSLM</text>
  <text x="100" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" fill="#fca5a5">OmniSLM</text>
</svg>
